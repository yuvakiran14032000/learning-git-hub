<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday 🎂</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --coral: #ff6b6b;
        --peach: #ffa07a;
        --gold: #ffd700;
        --mint: #98ffcc;
        --sky: #87ceeb;
        --lavender: #dda0dd;
      }
      body {
        font-family: "Quicksand", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      body.in {
        opacity: 1;
      }
      body.out {
        opacity: 0;
      }

      .countdown-number {
        font-family: "Playfair Display", serif;
        font-size: clamp(7rem, 22vw, 14rem);
        color: #fff;
        line-height: 1;
        text-shadow:
          0 0 60px rgba(255, 107, 107, 0.9),
          0 0 120px rgba(255, 215, 0, 0.5);
        animation: countPulse 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes countPulse {
        0% {
          transform: scale(1.9);
          opacity: 0;
        }
        70% {
          transform: scale(0.93);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .countdown-label {
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 6px;
        text-transform: uppercase;
        font-size: 0.85rem;
      }

      /* sparkle */
      .sparkle {
        position: fixed;
        pointer-events: none;
        z-index: 999;
        font-size: 1.2rem;
        animation: sparkleFade 1s ease-out forwards;
      }
      @keyframes sparkleFade {
        0% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
        100% {
          opacity: 0;
          transform: scale(0) translateY(-40px);
        }
      }
    </style>
  </head>
  <body>
    <div class="countdown-number" id="num">3</div>
    <div class="countdown-label" id="lbl">
      something magical is coming for you 🌟
    </div>

    <script>
      // Fade in
      requestAnimationFrame(() => document.body.classList.add("in"));

      function navigate(url) {
        document.body.classList.remove("in");
        document.body.classList.add("out");
        setTimeout(() => {
          window.location.href = url;
        }, 520);
      }

      const el = document.getElementById("num");
      const lbl = document.getElementById("lbl");
      const happyLabels = [
        "a magical moment is near 🌟",
        "a delightful surprise is close 💖",
        "get ready to beam with joy 😊🎉",
      ];
      let n = 3;

      function tick() {
        n--;
        el.style.animation = "none";
        el.offsetHeight;
        el.style.animation =
          "countPulse 0.85s cubic-bezier(0.34,1.56,0.64,1) both";
        if (n > 0) {
          el.textContent = n;
          lbl.textContent = happyLabels[3 - n];
          setTimeout(tick, 900);
        } else {
          el.innerHTML =
            '<img src="assets/images/get-ready.gif" style="width:clamp(180px,40vw,340px);border-radius:16px;" />';
          lbl.textContent = "Yay! Here we go! 🎂💝";
          setTimeout(() => navigate("ready.html"), 1000);
        }
      }
      setTimeout(tick, 900);

      // sparkle on click
      document.addEventListener("click", (e) => {
        ["✨", "🌸", "⭐", "💛", "🎉", "💫", "🌟"].slice(0, 5).forEach(() => {
          const s = document.createElement("div");
          s.className = "sparkle";
          s.textContent = ["✨", "🌸", "⭐", "💛", "🎉", "💫", "🌟"][
            Math.floor(Math.random() * 7)
          ];
          s.style.left = e.clientX + (Math.random() - 0.5) * 60 + "px";
          s.style.top = e.clientY + (Math.random() - 0.5) * 60 + "px";
          document.body.appendChild(s);
          setTimeout(() => s.remove(), 1000);
        });
      });
    </script>
  </body>
</html>
