<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Awww 💖</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --coral: #ff6b6b;
        --peach: #ffa07a;
        --gold: #ffd700;
      }
      body {
        font-family: "Quicksand", sans-serif;
        min-height: 100vh;
        overflow: hidden;
        background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      body.in {
        opacity: 1;
      }
      body.out {
        opacity: 0;
      }

      .screen-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(16px);
        border-radius: 32px;
        padding: 48px 40px;
        box-shadow:
          0 20px 80px rgba(255, 107, 107, 0.3),
          0 6px 28px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 500px;
        width: 90%;
        animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes cardIn {
        from {
          transform: scale(0.6) translateY(40px);
          opacity: 0;
        }
        to {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }
      .screen-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.4rem, 4vw, 2rem);
        color: #fff;
        text-shadow:
          0 0 20px rgba(255, 107, 107, 0.8),
          0 0 40px rgba(255, 215, 0, 0.4);
        line-height: 1.45;
        margin-bottom: 12px;
        font-style: italic;
      }
      .screen-sub {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 28px;
      }
      .gift-gif {
        width: 180px;
        margin: 0 auto 18px;
        border-radius: 16px;
        overflow: hidden;
      }
      .btn {
        font-family: "Quicksand", sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        padding: 14px 40px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        letter-spacing: 0.3px;
        background: linear-gradient(135deg, var(--coral), var(--peach));
        color: #fff;
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 28px rgba(255, 107, 107, 0.5);
      }
      .btn:active {
        transform: scale(0.95);
      }

      .bg-star {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        opacity: 0;
        animation: starFloat linear infinite;
      }
      @keyframes starFloat {
        0% {
          opacity: 0;
          transform: translateY(10px) scale(0.6);
        }
        25% {
          opacity: 0.45;
        }
        75% {
          opacity: 0.45;
        }
        100% {
          opacity: 0;
          transform: translateY(-55px) scale(1);
        }
      }
      .sparkle {
        position: fixed;
        pointer-events: none;
        z-index: 999;
        font-size: 1.2rem;
        animation: sparkleFade 1s ease-out forwards;
      }
      @keyframes sparkleFade {
        0% {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
        100% {
          opacity: 0;
          transform: scale(0) translateY(-40px);
        }
      }
    </style>
  </head>
  <body>
    <div class="screen-card">
      <div class="gift-gif">
        <img
          src="assets/images/kitty-shy.gif"
          alt="Kitty Shy"
          style="width: 100%; border-radius: 16px"
        />
      </div>
      <h2 class="screen-title">Awww, I knew it, bangaram! 💖</h2>
      <p class="screen-sub">Love you so so much! 😘✨</p>
      <button class="btn" onclick="navigate('birthday.html')">
        Show me the surprise! 🎉
      </button>
    </div>

    <audio autoplay loop>
      <source src="assets/music/background-music.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>

    <script>
      requestAnimationFrame(() => document.body.classList.add("in"));

      // Floating celebration background
      ["✨", "⭐", "💫", "🌟", "🎉", "🎊", "🎈", "💛", "🌸"].forEach((em) => {
        for (let j = 0; j < 2; j++) {
          const s = document.createElement("div");
          s.className = "bg-star";
          s.textContent = em;
          s.style.left = Math.random() * 96 + "vw";
          s.style.top = 5 + Math.random() * 85 + "vh";
          s.style.fontSize = 0.8 + Math.random() * 1.1 + "rem";
          s.style.animationDuration = 5 + Math.random() * 7 + "s";
          s.style.animationDelay = -(Math.random() * 10) + "s";
          document.body.appendChild(s);
        }
      });

      function navigate(url) {
        document.body.classList.remove("in");
        document.body.classList.add("out");
        setTimeout(() => {
          window.location.href = url;
        }, 520);
      }

      document.addEventListener("click", (e) => {
        const EM = ["✨", "🌸", "⭐", "💛", "🎉", "💫", "🌟"];
        for (let i = 0; i < 5; i++) {
          const s = document.createElement("div");
          s.className = "sparkle";
          s.textContent = EM[Math.floor(Math.random() * EM.length)];
          s.style.left = e.clientX + (Math.random() - 0.5) * 60 + "px";
          s.style.top = e.clientY + (Math.random() - 0.5) * 60 + "px";
          document.body.appendChild(s);
          setTimeout(() => s.remove(), 1000);
        }
      });
    </script>
  </body>
</html>
